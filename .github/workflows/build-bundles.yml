name: build-bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Linux: only build on the most common, latest GitHub runner (Ubuntu).
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file librsvg2-dev libgtk-3-dev patchelf wget libssl-dev
          # Optional tray/icon deps vary by distro.
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev
          # WebKitGTK version differs across Ubuntu images.
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      # `pnpm tauri build` already runs the frontend build (see tauri.conf.json beforeBuildCommand).
      # Windows runners occasionally fail to *execute* the Tauri test harness due to missing/mismatched
      # runtime dependencies (exit code 0xc0000139). We still compile tests on Windows to keep coverage.
      - name: Run Rust Tests (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: cargo test -q --manifest-path src-tauri/Cargo.toml

      - name: Compile Rust Tests (Windows, --no-run)
        if: matrix.os == 'windows-latest'
        run: cargo test -q --manifest-path src-tauri/Cargo.toml --no-run

      - name: Build Bundles
        run: pnpm tauri build

      - name: Upload Bundles
        uses: actions/upload-artifact@v4
        with:
          name: codexrelay-${{ matrix.os }}-bundles
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  release:
    name: github-release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # Collect typical Tauri bundle outputs from the build artifacts.
          # We keep the artifact-relative paths to avoid filename collisions.
          mapfile -d '' files < <(find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.msi" -o \
            -name "*-setup.exe" -o \
            -name "*.exe" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.rpm" \
          \) -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No bundle files found under artifacts/"
            find artifacts -type f | head -n 200
            exit 1
          fi

          for f in "${files[@]}"; do
            rel="${f#artifacts/}"
            mkdir -p "release-assets/$(dirname "$rel")"
            cp -f "$f" "release-assets/$rel"
          done

          echo "Collected assets:"
          find release-assets -type f -maxdepth 8 -print

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          # Deterministic ordering for stable diffs.
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          echo "Wrote $(wc -l < SHA256SUMS.txt) checksums to SHA256SUMS.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
